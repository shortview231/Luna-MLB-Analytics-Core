name: Docs Link Check

on:
  pull_request:
    paths:
      - "README.md"
      - "docs/**"

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate markdown links
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          files = [Path('README.md'), *Path('docs').rglob('*.md')]
          pat = re.compile(r'`([^`]+\.md)`')
          missing = []
          for f in files:
              text = f.read_text(encoding='utf-8')
              for rel in pat.findall(text):
                  p = (f.parent / rel).resolve()
                  if not p.exists():
                      missing.append((str(f), rel))
          if missing:
              for src, rel in missing:
                  print(f"Missing linked file in {src}: {rel}")
              raise SystemExit(1)
          print('Link check passed')
          PY
